; Dreadnought Revival Launcher configuration
; Place this file next to DreadnoughtLauncher.exe in the Dreadnought root directory.
; Edit GatewayHost to point at your revival server.

[Revival]
; REST gateway (handles /api/v1/authentication/login, /api/v1/play, etc.)
GatewayHost=127.0.0.1
GatewayPort=8080

; YFirmament MMOG WebSocket server.  If your revival server hosts both on
; the same host, leave YFirmamentHost unset and it will default to GatewayHost.
;YFirmamentHost=127.0.0.1
; Must match the server's mmog_port (config.json) — default 9000.
YFirmamentPort=9000
